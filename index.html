<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calm Bubble</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #e0f2f1; font-family: sans-serif; overflow: hidden; }
        .container { text-align: center; }
        .bubble { width: 120px; height: 120px; background: #80deea; border-radius: 50%; margin: 0 auto 30px; animation: breathe 8s infinite ease-in-out; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .text { color: #00796b; font-size: 1.2rem; transition: 0.5s; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(2.2); background: #4db6ac; } }
    </style>
</head>
<body>
<div class="container">
    <div class="bubble"></div>
    <div id="t" class="text">ゆっくり吸って...</div>
</div>
<script>
    const t = document.getElementById('t');
    setInterval(() => { t.innerText = t.innerText === 'ゆっくり吸って...' ? '細く長く吐いて...' : 'ゆっくり吸って...'; }, 4000);
</script>
</body>
</html>
